name: Android Token PR

on:
  workflow_call:

permissions:
  contents: read

jobs:
  android-token-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Design Tokens Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Token Bot App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SAION_TOKEN_BOT_APP_ID }}
          private-key: ${{ secrets.SAION_TOKEN_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Previous Tokens
        run: |
          git show HEAD~1:tokens/tokens.json > previous-tokens.json || echo "{}" > previous-tokens.json

      - name: Generate Android Tokens
        run: npm run build:android

      - name: Checkout Android DS Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ANDROID_DS_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: saion-android-ds

      - name: Copy Generated Tokens
        run: |
          mkdir -p "saion-android-ds/${{ vars.ANDROID_DS_TOKEN_PATH }}"
          cp -R build/android/. "saion-android-ds/${{ vars.ANDROID_DS_TOKEN_PATH }}/"

      - name: Create Android PR Body
        id: pr-body
        run: |
          changelog="$(mktemp)"
          node scripts/common/create-token-changelog.mjs \
            previous-tokens.json \
            tokens/tokens.json \
            "$changelog"

          body="$(node scripts/common/create-pr-body.mjs "$changelog")"

          {
            echo 'body<<EOF'
            printf '%s\n' "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: saion-android-ds
          branch: automate/update-design-tokens
          delete-branch: true
          commit-message: update generated design tokens
          title: Update generated design tokens
          body: ${{ steps.pr-body.outputs.body }}
