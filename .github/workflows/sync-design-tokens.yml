name: Generate Design Tokens

on:
  push:
    branches:
      - main
    paths:
      - 'tokens/**'

  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  android:
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android'
    uses: ./.github/workflows/sync-android-design-tokens.yml
    secrets: inherit

  ios:
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'ios'
    uses: ./.github/workflows/sync-ios-design-tokens.yml
    secrets: inherit

  notify-failure:
    runs-on: ubuntu-latest
    needs:
      - android
      - ios
    if: |
      always() &&
      (
        needs.android.result == 'failure' ||
        needs.ios.result == 'failure'
      )

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANDROID_RESULT: ${{ needs.android.result }}
          IOS_RESULT: ${{ needs.ios.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED=""

          if [ "$ANDROID_RESULT" = "failure" ]; then
            FAILED="${FAILED}• Android\n"
          fi

          if [ "$IOS_RESULT" = "failure" ]; then
            FAILED="${FAILED}• iOS\n"
          fi

          curl \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚨 Design Token Workflow Failed\",
                \"description\": \"토큰 생성 또는 PR 생성에 실패했습니다.\",
                \"color\": 15158332,
                \"fields\": [
                  {
                    \"name\": \"Failed Platforms\",
                    \"value\": \"$FAILED\"
                  },
                  {
                    \"name\": \"Workflow\",
                    \"value\": \"$RUN_URL\"
                  }
                ]
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"