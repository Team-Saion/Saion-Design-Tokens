name: iOS Token PR

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ios-token-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Design Tokens Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Token Bot App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SAION_TOKEN_BOT_APP_ID }}
          private-key: ${{ secrets.SAION_TOKEN_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Previous Tokens
        run: |
          git show HEAD~1:tokens/tokens.json > previous-tokens.json || echo "{}" > previous-tokens.json

      - name: Generate iOS Tokens
        run: npm run build:ios

      - name: Checkout iOS DS Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.IOS_DS_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: saion-ios-ds

      - name: Copy Generated Tokens
        run: |
          mkdir -p "saion-ios-ds/${{ vars.IOS_DS_TOKEN_PATH }}"
          cp -R build/ios/. "saion-ios-ds/${{ vars.IOS_DS_TOKEN_PATH }}/"

      - name: Create iOS PR Body
        id: pr-body
        run: |
          body="$(node scripts/common/create-pr-body.mjs \
            ios \
            previous-tokens.json \
            tokens/tokens.json)"

          {
            echo 'body<<EOF'
            printf '%s\n' "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: saion-ios-ds
          branch: automate/update-design-tokens
          delete-branch: true
          commit-message: update generated design tokens
          title: Update generated design tokens
          body: ${{ steps.pr-body.outputs.body }}
